<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Heart of the Tiles</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,1,0..1&icon_names=pause,play_arrow"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                overflow: hidden;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            html::-webkit-scrollbar,
            body::-webkit-scrollbar {
                display: none;
            }

            body {
                background-color: #f0f0f0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            }

            .game_container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .canvas_wrapper {
                position: relative;
                border: 2px solid #333;
            }

            #game_canvas {
                display: block;
                background-color: #ffffff;
                cursor: pointer;
            }

            .canvas_instructions {
                position: absolute;
                top: 128px;
                left: 50%;
                transform: translateX(-50%);
                background-color: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 8px 16px;
                border-radius: 4px;
                font-size: 11px;
                text-align: center;
                pointer-events: none;
                white-space: nowrap;
                z-index: 10;
            }

            .canvas_instructions .key {
                display: inline-block;
                background-color: #fff;
                color: #333;
                padding: 1px 5px;
                border-radius: 2px;
                font-family: monospace;
                font-size: 10px;
                margin: 0 2px;
            }

            #error_message {
                display: none;
                background-color: #ffebee;
                border: 1px solid #f44336;
                color: #c62828;
                padding: 15px;
                border-radius: 8px;
                max-width: 405px;
                text-align: center;
                margin-top: 10px;
            }

            .load_level_button {
                position: absolute;
                top: 24px;
                left: 50%;
                transform: translateX(-50%);
                background-color: #4caf50;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 4px;
                font-size: 12px;
                cursor: pointer;
                z-index: 20;
                font-family: inherit;
                transition: background-color 0.2s ease;
            }

            .load_level_button:hover {
                background-color: #45a049;
            }

            .load_level_button:active {
                background-color: #3d8b40;
            }

            #level_file_input {
                display: none;
            }

            .load_status {
                position: absolute;
                top: 128px;
                left: 50%;
                transform: translateX(-50%);
                background-color: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 6px 12px;
                border-radius: 4px;
                font-size: 11px;
                z-index: 20;
                display: none;
            }

            .load_status.error {
                background-color: rgba(244, 67, 54, 0.9);
            }

            .load_status.success {
                background-color: rgba(76, 175, 80, 0.9);
            }

            .pause_play_button {
                position: absolute;
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 20;
                transition: background-color 0.2s ease;
            }

            .pause_play_button:hover {
                opacity: 0.9;
            }

            .pause_play_button:active {
                opacity: 0.8;
            }

            .pause_play_button .material-symbols-outlined {
                font-size: 24px;
                color: white;
            }

            .pause_play_button.paused {
                background-color: #607afb;
            }

            .pause_play_button.playing {
                background-color: #fb923c;
            }

            /* Customize Level Dialog */
            .customize_dialog_overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }

            .customize_dialog {
                background-color: #ffffff;
                border-radius: 12px;
                padding: 24px;
                width: 380px;
                max-width: 90vw;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            }

            .dialog_header {
                display: flex;
                align-items: center;
                margin-bottom: 20px;
                position: relative;
            }

            .dialog_back_button {
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                font-size: 20px;
                cursor: pointer;
                color: #333;
                padding: 4px 8px;
                border-radius: 4px;
                line-height: 1;
            }

            .dialog_back_button:hover {
                background-color: #f0f0f0;
            }

            .customize_dialog_title {
                font-size: 20px;
                font-weight: 600;
                color: #333;
                text-align: center;
                flex: 1;
            }

            .customize_dialog_subtitle {
                font-size: 13px;
                color: #666;
                text-align: center;
                margin-top: 4px;
                margin-bottom: 20px;
                width: 100%;
            }

            .unit_switch_row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 10px;
                margin-bottom: 15px;
            }

            .unit_switch {
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                font-size: 12px;
                color: #555;
                font-weight: 500;
            }

            .unit_switch input {
                cursor: pointer;
                accent-color: #4caf50;
            }

            .dialog_page {
                min-height: 0;
            }

            .config_section_title {
                font-size: 14px;
                font-weight: 500;
                color: #555;
                margin-bottom: 12px;
            }

            .mode_options {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 20px;
            }

            .mode_option {
                display: flex;
                align-items: flex-start;
                padding: 12px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    border-color 0.2s ease,
                    background-color 0.2s ease;
            }

            .mode_option:hover {
                border-color: #4caf50;
                background-color: #f5f9f5;
            }

            .mode_option.selected {
                border-color: #4caf50;
                background-color: #e8f5e9;
            }

            .mode_option input[type='radio'] {
                margin-right: 12px;
                margin-top: 2px;
                accent-color: #4caf50;
            }

            .mode_option_content {
                flex: 1;
            }

            .mode_option_label {
                font-weight: 500;
                color: #333;
                margin-bottom: 4px;
            }

            .mode_option_description {
                font-size: 12px;
                color: #666;
            }

            .mode_config_section {
                display: none;
                margin-top: 12px;
                padding: 12px;
                background-color: #f5f5f5;
                border-radius: 8px;
            }

            .mode_config_section.visible {
                display: block;
            }

            .config_row {
                display: flex;
                align-items: center;
                margin-bottom: 8px;
            }

            .config_row:last-child {
                margin-bottom: 0;
            }

            .config_label {
                flex: 1;
                font-size: 13px;
                color: #333;
            }

            .config_input {
                width: 100px;
                padding: 6px 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 13px;
                text-align: right;
            }

            .config_input:focus {
                outline: none;
                border-color: #4caf50;
            }

            .tps_rows_container {
                max-height: 150px;
                overflow-y: auto;
                margin-top: 8px;
            }

            .tps_row {
                display: flex;
                align-items: center;
                margin-bottom: 6px;
            }

            .tps_row_label {
                width: 80px;
                font-size: 12px;
                color: #666;
            }

            .tps_row_input {
                flex: 1;
                padding: 6px 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 13px;
            }

            .tps_row_input:focus {
                outline: none;
                border-color: #4caf50;
            }

            .add_tps_row_button {
                margin-top: 8px;
                padding: 6px 12px;
                background-color: #e0e0e0;
                border: none;
                border-radius: 4px;
                font-size: 12px;
                cursor: pointer;
                color: #333;
            }

            .add_tps_row_button:hover {
                background-color: #d0d0d0;
            }

            .dialog_buttons {
                display: flex;
                gap: 12px;
                margin-top: 20px;
            }

            .dialog_button {
                flex: 1;
                padding: 10px 16px;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background-color 0.2s ease;
                font-family: inherit;
            }

            .dialog_button.cancel {
                background-color: #f44336;
                color: white;
            }

            .dialog_button.cancel:hover {
                background-color: #d32f2f;
            }

            .dialog_button.play {
                background-color: #4caf50;
                color: white;
            }

            .dialog_button.play:hover {
                background-color: #45a049;
            }
        </style>
    </head>

    <body>
        <div class="game_container">
            <div class="canvas_wrapper">
                <canvas id="game_canvas" width="405" height="720"></canvas>
                <div class="canvas_instructions">
                    <span class="key">D</span><span class="key">F</span><span class="key">J</span
                    ><span class="key">K</span> Columns &nbsp;|&nbsp; <span class="key">R</span> Reset
                </div>
                <button class="pause_play_button paused" id="pause_play_btn">
                    <span class="material-symbols-outlined">play_arrow</span>
                </button>
                <button class="load_level_button" id="load_level_btn">Load Level JSON</button>
                <input type="file" id="level_file_input" accept="application/json" />
                <div class="load_status" id="load_status"></div>
            </div>
            <div id="error_message"></div>
        </div>
        <script type="module" src="./dist/renderer_main.js"></script>
    </body>
</html>
